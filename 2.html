<body>
    <form action="" method="post" onsubmit="return false">
        <label for="">Masukkan Nama Kota</label>
        <input type="text" id="kota">
        <button onclick="jasaPengiriman()"> Test</button>
    </form>


    <p id="hasil"></p>
    <script>
        function jasaPengiriman() {
            let kota = document.getElementById("kota").value;
            let berat = 10;
            let tarif = 0;

            if (kota === "Bandung") {
                tarif = 2000;
            } else if (kota === "Depok") {
                tarif = 4000;
            } else {
                tarif = 6000;
            }
            const total = berat * tarif;
            document.querySelector("#hasil").innerHTML = total;
        }
